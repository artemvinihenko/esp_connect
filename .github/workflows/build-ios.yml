name: Build iOS

on:
  push:
    branches: []  # Пустой список - не запускается при пуше
  pull_request:
    branches: []  # Пустой список - не запускается при PR
  workflow_dispatch:  # Только ручной запускп

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest  # Требуется macOS для сборки iOS
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          architecture: x64
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..
      
      - name: Build iOS (simulator)
        run: flutter build ios --release --no-codesign
      
      - name: Create IPA from build
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: app.ipa